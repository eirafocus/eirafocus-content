name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate content
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          set -e
          fail=0
          # shellcheck disable=SC2044
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            if ! python3 -m json.tool < "$f" > /dev/null; then
              echo "::error file=$f::Invalid JSON"
              fail=1
            fi
          done
          exit $fail
        shell: bash

      - name: Check manifest references resolve
        run: |
          set -e
          python3 <<'PY'
          import json, os, sys

          with open('manifest.json') as f:
              m = json.load(f)

          # Collect candidate file paths only from known location-shaped keys.
          # Avoids false-positives on descriptive "note" strings that happen to contain "/".
          paths = []
          paths.extend(m.get('data', {}).values())
          paths.extend(m.get('programs', {}).values())
          paths.extend(m.get('branding', {}).values())
          for section in m.get('audio', {}).values():
              if isinstance(section, dict):
                  paths.extend(section.get('files', []) or [])

          missing = [p for p in paths if isinstance(p, str) and not os.path.exists(p)]
          if missing:
              for p in missing:
                  print(f"::error::Manifest references missing file: {p}")
              sys.exit(1)
          print(f"manifest.json: {len(paths)} path references all resolve")
          PY
        shell: bash
