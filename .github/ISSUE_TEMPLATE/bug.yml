name: Bug / content issue
description: Wrong, broken, or missing content
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What's wrong
      placeholder: Which file? What's broken or incorrect?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What it should be
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: Affected file(s)
      placeholder: data/quotes.json, audio/ambient/rain.mp3, …
